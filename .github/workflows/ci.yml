name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java: [ '11', '17' ]

    name: Java ${{ matrix.java }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and test
        run: mvn -q verify

      - name: Upload coverage to Codecov
        if: matrix.java == '11'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          # Pin the CLI to avoid the noisy "latest version" metadata fetch (can return HTML and log a JSON parse error).
          version: v11.2.8
          # We already generate JaCoCo XML; disable optional autodetect plugins (xcode/gcov/pycoverage) to reduce warnings on Linux runners.
          plugins: noop
          fail_ci_if_error: false
          file: target/site/jacoco/jacoco.xml
          disable_search: true
